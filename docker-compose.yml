services:
  frontend:
    build:
      context: .
      target: frontend
    container_name: electrodead-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - electrodead_net
    restart: unless-stopped

  backend:
    build:
      context: .
      target: backend
    container_name: electrodead-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/banda_db
      JWT_SECRET: electrodead-dev-secret
      JWT_EXPIRES_IN: 8h
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: "123456"
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - electrodead_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: electrodead-postgres
    environment:
      POSTGRES_DB: banda_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - electrodead_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d banda_db"]
      interval: 5s
      timeout: 5s
      start_period: 15s
      retries: 10
    networks:
      - electrodead_net
    restart: unless-stopped

networks:
  electrodead_net:
    driver: bridge

volumes:
  electrodead_postgres_data:
